name: Build and Push Orders Service to ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/orders/src/**"
      # - ".github/workflows/build-push-orders.yaml" # During testing phases only for prod comment this line

permissions:
  id-token: write # Needed for OIDC
  contents: write # Needed to push commits

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gleamgoods/orders

jobs:
  build-and-push-orders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-gleamgoods
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: vars
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV
          echo "SHA_TAG=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "Using tags: latest and $SHA_TAG"
          echo "latest = convenience tag for testing"
          echo "$SHA_TAG = immutable tag used in Helm values"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: ./src/orders
          file: ./src/orders/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ steps.vars.outputs.SHA_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Optional: Better cache isolation for this service
          # cache-from: type=gha,scope=orders-service
          # cache-to: type=gha,scope=orders-service,mode=max

      - name: CI Complete
        run: |
          echo "✅ Image push completed successfully"
          echo "Tags used: latest and ${{ steps.vars.outputs.SHA_TAG }}"