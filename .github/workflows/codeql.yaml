name: CodeQL SAST

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
  schedule:
    # Catch newly-published CodeQL query/CVE coverage even with no code changes
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write # Needed for OIDC (report upload)

env:
  AWS_REGION: us-east-1
  REPORT_BUCKET: ${{ vars.REPORT_BUCKET }}

jobs:
  analyze:
    name: Analyze (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ui
            language: java-kotlin
            source-root: src/ui
            build-mode: manual
          - name: cart
            language: java-kotlin
            source-root: src/cart
            build-mode: manual
          - name: orders
            language: java-kotlin
            source-root: src/orders
            build-mode: manual
          - name: catalog
            language: go
            source-root: src/catalog
            build-mode: autobuild
          - name: checkout
            language: javascript-typescript
            source-root: src/checkout
            build-mode: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          source-root: ${{ matrix.source-root }}
          build-mode: ${{ matrix.build-mode }}

      - name: Manual build (Maven services)
        if: matrix.build-mode == 'manual'
        run: |
          cd ${{ matrix.source-root }}
          ./mvnw -DskipTests package -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.name }}"
          output: sarif-results

      - name: Configure AWS credentials via OIDC
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-gleamgoods
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload CodeQL SARIF report to S3
        if: always()
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp sarif-results/${{ matrix.language }}.sarif \
            s3://${{ env.REPORT_BUCKET }}/codeql-reports/${{ matrix.name }}/${GITHUB_SHA::7}/codeql-${TIMESTAMP}.sarif \
            || echo "CodeQL SARIF upload skipped"
