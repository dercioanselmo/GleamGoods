name: CodeQL SAST

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
  schedule:
    # Catch newly-published CodeQL query/CVE coverage even with no code changes.
    # Runs the full matrix regardless of what changed.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write # Needed for OIDC (report upload)

env:
  AWS_REGION: us-east-1
  REPORT_BUCKET: ${{ vars.REPORT_BUCKET }}

jobs:
  # ==============================================================
  # Work out which service(s) actually changed and build a matrix
  # containing only those - on push/PR we don't want to re-analyze
  # all 5 services just because one changed. Schedule runs always
  # analyzes everything to catch drift/newly-published queries.
  # ==============================================================
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui: 'src/ui/**'
            catalog: 'src/catalog/**'
            cart: 'src/cart/**'
            checkout: 'src/checkout/**'
            orders: 'src/orders/**'

      - name: Build matrix
        id: build-matrix
        run: |
          ui='{"name":"ui","language":"java-kotlin","source-root":"src/ui","build-mode":"manual"}'
          cart='{"name":"cart","language":"java-kotlin","source-root":"src/cart","build-mode":"manual"}'
          orders='{"name":"orders","language":"java-kotlin","source-root":"src/orders","build-mode":"manual"}'
          catalog='{"name":"catalog","language":"go","source-root":"src/catalog","build-mode":"autobuild"}'
          checkout='{"name":"checkout","language":"javascript-typescript","source-root":"src/checkout","build-mode":"none"}'

          if [ "${{ github.event_name }}" = "schedule" ]; then
            MATRIX=$(jq -c -n --argjson a "$ui" --argjson b "$cart" --argjson c "$orders" --argjson d "$catalog" --argjson e "$checkout" '[$a,$b,$c,$d,$e]')
          else
            MATRIX='[]'
            [ "${{ steps.filter.outputs.ui }}" = "true" ] && MATRIX=$(echo "$MATRIX" | jq -c --argjson x "$ui" '. + [$x]')
            [ "${{ steps.filter.outputs.cart }}" = "true" ] && MATRIX=$(echo "$MATRIX" | jq -c --argjson x "$cart" '. + [$x]')
            [ "${{ steps.filter.outputs.orders }}" = "true" ] && MATRIX=$(echo "$MATRIX" | jq -c --argjson x "$orders" '. + [$x]')
            [ "${{ steps.filter.outputs.catalog }}" = "true" ] && MATRIX=$(echo "$MATRIX" | jq -c --argjson x "$catalog" '. + [$x]')
            [ "${{ steps.filter.outputs.checkout }}" = "true" ] && MATRIX=$(echo "$MATRIX" | jq -c --argjson x "$checkout" '. + [$x]')
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Services to analyze: $MATRIX"

  analyze:
    needs: changes
    if: needs.changes.outputs.matrix != '[]'
    name: Analyze (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          source-root: ${{ matrix.source-root }}
          build-mode: ${{ matrix.build-mode }}

      - name: Manual build (Maven services)
        if: matrix.build-mode == 'manual'
        run: |
          cd ${{ matrix.source-root }}
          ./mvnw -DskipTests package -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.name }}"
          output: sarif-results

      - name: Configure AWS credentials via OIDC
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-gleamgoods
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload CodeQL SARIF report to S3
        if: always()
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp sarif-results/${{ matrix.language }}.sarif \
            s3://${{ env.REPORT_BUCKET }}/codeql-reports/${{ matrix.name }}/${GITHUB_SHA::7}/codeql-${TIMESTAMP}.sarif \
            || echo "CodeQL SARIF upload skipped"
