name: Build and Push UI Service to ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/ui/src/**"
      #- ".github/workflows/build-push-ui.yaml" # During testing phases only for prod comment this line

permissions:
  id-token: write # Needed for OIDC
  contents: write # Needed to push commits

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gleamgoods/ui
  REPORT_BUCKET: ${{ vars.REPORT_BUCKET }}

jobs:
  build-and-push-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==========================================================
      # Trivy Repository Scan (Secrets + Misconfigurations + Vulnerabilities)
      # ==========================================================
      - name: Run Trivy Repository Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: json
          output: trivy-fs.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-gleamgoods
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: vars
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV
          echo "TAGS=latest $SHA_TAG" >> $GITHUB_ENV
          echo "Using tags: latest and $SHA_TAG"
          echo "latest = convenience tag for testing"
          echo "$SHA_TAG = immutable tag used in Helm values"

      - name: Build and push Docker images
        run: |
          for tag in $TAGS; do
            IMAGE_URI="$IMAGE_BASE:$tag"
            echo "Building and pushing $IMAGE_URI"
            docker build -t $IMAGE_URI src/ui
            docker push $IMAGE_URI
          done

      - name: Setup Git auth using GITHUB_TOKEN
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "dercio.anselmo@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # ==========================================================
      # Snyk Container Scan
      # ==========================================================
      - name: Run Snyk Container scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: "${{ env.IMAGE_BASE }}:sha-${GITHUB_SHA::7}"
          args: --file=src/ui/Dockerfile --severity-threshold=high --json-file-output=snyk-container.json

      # ==========================================================
      # Upload Security Reports
      # ==========================================================
      - name: Upload Trivy report to S3
        if: always()
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp trivy-fs.json \
            s3://${{ env.REPORT_BUCKET }}/trivy-reports/${GITHUB_SHA::7}/trivy-fs-${TIMESTAMP}.json \
            || echo "Trivy report upload skipped"

      - name: Upload Snyk report to S3
        if: always()
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp snyk-container.json \
            s3://${{ env.REPORT_BUCKET }}/snyk-reports/${GITHUB_SHA::7}/snyk-container-${TIMESTAMP}.json \
            || echo "Snyk report upload skipped"

      - name: Update Helm values file with new image tag
        run: |
          cd src/ui
          git config user.name "ci-bot"
          git config user.email "dercio.anselmo@gmail.com"
          sed -i "s|^  tag: .*|  tag: sha-${GITHUB_SHA::7}|" chart/values-ui.yaml
          git diff --quiet || (
            git add chart/values-ui.yaml
            git commit -m "Update UI image tag to sha-${GITHUB_SHA::7}"
            git push origin main
          )

      - name: CI Complete
        run: |
          echo "Image push and Git update done"
          echo "Tags used: $TAGS"