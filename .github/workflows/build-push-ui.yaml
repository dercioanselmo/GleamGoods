name: Build and Push UI Service to ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/ui/src/**"
      #- ".github/workflows/build-push-ui.yaml"

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: gleamgoods/ui
  REPORT_BUCKET: ${{ vars.REPORT_BUCKET }}

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Open Source Scan
        run: |
          echo "→ Current directory: $(pwd)"
          echo "→ Files in src/ui:"
          ls -la src/ui
          
          cd src/ui
          echo "→ Running in: $(pwd)"
          
          if [ -f package.json ]; then
            echo "✅ package.json found"
            npm ci --silent --ignore-scripts || echo "npm ci failed"
            npx snyk test --severity-threshold=high --json > ../snyk-os.json 2>&1 || true
            echo "→ Snyk scan completed"
          else
            echo "❌ No package.json found in src/ui"
            echo '{"error": "No package.json found in src/ui directory"}' > ../snyk-os.json
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-gleamgoods
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Snyk OS report to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          if [ -f snyk-os.json ] && [ -s snyk-os.json ]; then
            aws s3 cp snyk-os.json s3://${{ env.REPORT_BUCKET }}/snyk-reports/${GITHUB_SHA::7}/snyk-os-${TIMESTAMP}.json
            echo "✅ OS report uploaded"
          else
            echo "⚠️ No valid OS report - creating placeholder"
            echo '{"error": "Snyk scan did not produce output"}' > snyk-os.json
            aws s3 cp snyk-os.json s3://${{ env.REPORT_BUCKET }}/snyk-reports/${GITHUB_SHA::7}/snyk-os-${TIMESTAMP}.json
          fi

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role-gleamgoods
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Define image tags
        id: vars
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "IMAGE_BASE=$IMAGE_BASE" >> $GITHUB_ENV
          echo "TAGS=latest $SHA_TAG" >> $GITHUB_ENV

      - name: Build and push Docker images
        run: |
          for tag in $TAGS; do
            IMAGE_URI="$IMAGE_BASE:$tag"
            echo "Building and pushing $IMAGE_URI"
            docker build -t $IMAGE_URI src/ui
            docker push $IMAGE_URI
          done

      - name: Run Snyk Container scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: "${{ env.IMAGE_BASE }}:sha-${GITHUB_SHA::7}"
          args: --file=src/ui/Dockerfile --severity-threshold=high --json-file-output=snyk-container.json

      - name: Upload Container scan report to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp snyk-container.json s3://${{ env.REPORT_BUCKET }}/snyk-reports/${GITHUB_SHA::7}/snyk-container-${TIMESTAMP}.json || echo "⚠️ Container report upload failed"

      - name: Setup Git auth using GITHUB_TOKEN
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "dercio.anselmo@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Update Helm values file with new image tag
        run: |
          cd src/ui
          git config user.name "ci-bot"
          git config user.email "dercio.anselmo@gmail.com"
          sed -i "s|^ tag: .*| tag: sha-${GITHUB_SHA::7}|" chart/values-ui.yaml
          git diff --quiet || (
            git add chart/values-ui.yaml
            git commit -m "Update UI image tag to sha-${GITHUB_SHA::7}"
            git push origin main
          )

      - name: CI Complete
        run: |
          echo "✅ Build, push, and Helm update completed successfully"